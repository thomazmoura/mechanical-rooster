services:
  postgres:
    image: postgres:17-alpine
    container_name: mechanicalrooster-db
    environment:
      POSTGRES_USER: rooster
      POSTGRES_PASSWORD: rooster
      POSTGRES_DB: mechanicalrooster
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rooster -d mechanicalrooster"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
