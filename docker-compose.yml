services:
  postgres:
    image: postgres:17-alpine
    container_name: relentlessbadger-db
    environment:
      POSTGRES_USER: badger
      POSTGRES_PASSWORD: badger
      POSTGRES_DB: relentlessbadger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badger -d relentlessbadger"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
